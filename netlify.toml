# Netlify configuration — static site, no build step needed
[build]
  publish = "."
  command = ""

# Long-cache the static assets (fingerprinted by the original build)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
